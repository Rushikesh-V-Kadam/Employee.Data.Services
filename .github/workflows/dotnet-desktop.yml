name: CI/CD Pipeline

on:
  pull_request:
    branches: [dev, qa, main]
  push:
    branches: [dev, qa, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - run: dotnet test --no-build --verbosity normal

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
      - run: dotnet publish -c Release -o ./publish
      - uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ github.ref == 'refs/heads/dev' && 'myapp-dev' || github.ref == 'refs/heads/qa' && 'myapp-qa' || 'myapp-prod' }}
          publish-profile: ${{ github.ref == 'refs/heads/dev' && secrets.AZURE_WEBAPP_PUBLISH_PROFILE_DEV || github.ref == 'refs/heads/qa' && secrets.AZURE_WEBAPP_PUBLISH_PROFILE_QA || secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROD }}
          package: ./publish
